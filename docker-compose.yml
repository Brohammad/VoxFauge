services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: voxforge
      POSTGRES_PASSWORD: voxforge
      POSTGRES_DB: voxforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://voxforge:voxforge@postgres:5432/voxforge
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn voxforge.main:app --host 0.0.0.0 --port 8000 --reload --app-dir /app/src

volumes:
  postgres_data:
