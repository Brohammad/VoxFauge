global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: voxforge
    metrics_path: /api/v1/metrics
    # In production set authorization.credentials to METRICS_BEARER_TOKEN
    # authorization:
    #   credentials: <METRICS_BEARER_TOKEN>
    static_configs:
      - targets: ["app:8000"]
