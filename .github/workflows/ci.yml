name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  STT_PROVIDER: mock
  LLM_PROVIDER: mock
  TTS_PROVIDER: mock
  MEMORY_ENABLED: "false"
  EVALUATION_HALLUCINATION_ENABLED: "false"
  TOOLS_ENABLED: "false"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: voxforge
          POSTGRES_PASSWORD: voxforge
          POSTGRES_DB: voxforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,livekit]"

      - name: Lint
        run: ruff check src tests

      - name: Dependency audit
        run: |
          pip install pip-audit
          pip-audit -r <(pip freeze) --desc on --skip-editable

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://voxforge:voxforge@localhost:5432/voxforge
        run: alembic upgrade head

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://voxforge:voxforge@localhost:5432/voxforge
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/unit -v --tb=short

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://voxforge:voxforge@localhost:5432/voxforge
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/integration -v --tb=short

      - name: Run feature tests
        env:
          DATABASE_URL: postgresql+asyncpg://voxforge:voxforge@localhost:5432/voxforge
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/feature -v --tb=short -m feature

      - name: Run failure-mode tests
        env:
          DATABASE_URL: postgresql+asyncpg://voxforge:voxforge@localhost:5432/voxforge
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/failure -v --tb=short -m failure

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql+asyncpg://voxforge:voxforge@localhost:5432/voxforge
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/e2e -v --tb=short -m e2e

      - name: Run full suite with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://voxforge:voxforge@localhost:5432/voxforge
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/ -v --tb=short \
            --cov=voxforge \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=70

      - name: Generate coverage markdown report
        run: python scripts/generate_coverage_report.py --skip-tests --fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/
            docs/testing/coverage-report.md

  benchmark-onboarding:
    runs-on: ubuntu-latest
    needs: lint-and-test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run onboarding benchmark
        run: python scripts/benchmark_onboarding.py --iterations 10 --warmup 2 --json | tee benchmark-onboarding.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-onboarding
          path: benchmark-onboarding.json

  benchmark-knowledge-base:
    runs-on: ubuntu-latest
    needs: lint-and-test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run knowledge base benchmark
        run: python scripts/benchmark_knowledge_base.py --iterations 50 --json | tee benchmark-knowledge-base.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-knowledge-base
          path: benchmark-knowledge-base.json

  eval-gate:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run evaluation quality gate
        env:
          EVAL_GATE_MIN_OVERALL: "0.75"
          EVAL_GATE_E2E_TARGET_MS: "2000"
        run: python scripts/eval_gate.py

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build production Docker image
        run: docker build -f Dockerfile.prod -t voxforge:ci .

  browser-tests:
    runs-on: ubuntu-latest
    needs: lint-and-test

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: voxforge
          POSTGRES_PASSWORD: voxforge
          POSTGRES_DB: voxforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,livekit]"

      - name: Run browser tests
        env:
          DATABASE_URL: postgresql+asyncpg://voxforge:voxforge@localhost:5432/voxforge
          REDIS_URL: redis://localhost:6379/0
          DEMO_ENABLED: "true"
          JWT_SECRET_KEY: ci-browser-test-secret-key-32-chars-min
          API_KEY_HASH_PEPPER: ci-browser-test-pepper-value
        run: |
          chmod +x scripts/run_browser_tests.sh
          ./scripts/run_browser_tests.sh
