name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  STT_PROVIDER: mock
  LLM_PROVIDER: mock
  TTS_PROVIDER: mock
  MEMORY_ENABLED: "false"
  EVALUATION_HALLUCINATION_ENABLED: "false"
  TOOLS_ENABLED: "false"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: voxforge
          POSTGRES_PASSWORD: voxforge
          POSTGRES_DB: voxforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,livekit]"

      - name: Lint
        run: ruff check src tests

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://voxforge:voxforge@localhost:5432/voxforge
        run: alembic upgrade head

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://voxforge:voxforge@localhost:5432/voxforge
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest -v --tb=short \
            --cov=voxforge \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  benchmark-onboarding:
    runs-on: ubuntu-latest
    needs: lint-and-test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run onboarding benchmark
        run: python scripts/benchmark_onboarding.py --iterations 10 --warmup 2 --json | tee benchmark-onboarding.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-onboarding
          path: benchmark-onboarding.json

  eval-gate:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run evaluation quality gate
        env:
          EVAL_GATE_MIN_OVERALL: "0.75"
          EVAL_GATE_E2E_TARGET_MS: "2000"
        run: python scripts/eval_gate.py
