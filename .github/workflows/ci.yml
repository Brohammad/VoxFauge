name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: voxforge
          POSTGRES_PASSWORD: voxforge
          POSTGRES_DB: voxforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,livekit]"

      - name: Lint
        run: ruff check src tests

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://voxforge:voxforge@localhost:5432/voxforge
          REDIS_URL: redis://localhost:6379/0
          EVALUATION_HALLUCINATION_ENABLED: "false"
        run: pytest -v --tb=short

  eval-gate:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run evaluation quality gate
        env:
          EVAL_GATE_MIN_OVERALL: "0.75"
          EVAL_GATE_E2E_TARGET_MS: "2000"
        run: python scripts/eval_gate.py
