# Production stack — use with .env.production (see docs/deployment/guide.md)
name: voxforge-prod

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voxforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-voxforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voxforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "${COMPOSE_CPU_POSTGRES:-0.30}"
          memory: ${COMPOSE_MEM_POSTGRES:-512M}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "${COMPOSE_CPU_REDIS:-0.10}"
          memory: ${COMPOSE_MEM_REDIS:-128M}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-voxforge}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-voxforge}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    entrypoint: ["/app/scripts/docker-entrypoint.sh"]
    command:
      [
        "uvicorn",
        "voxforge.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--app-dir",
        "/app/src",
        "--workers",
        "1",
      ]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "${COMPOSE_CPU_APP:-0.50}"
          memory: ${COMPOSE_MEM_APP:-1G}
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  livekit-worker:
    profiles: ["livekit"]
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-voxforge}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-voxforge}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      APP_ENV: production
    depends_on:
      app:
        condition: service_healthy
    command: ["python", "-m", "voxforge.infrastructure.livekit.worker"]
    deploy:
      resources:
        limits:
          cpus: "${COMPOSE_CPU_LIVEKIT:-0.30}"
          memory: ${COMPOSE_MEM_LIVEKIT:-512M}
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  knowledge-worker:
    profiles: ["knowledge"]
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-voxforge}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-voxforge}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    command: ["python", "-m", "voxforge.infrastructure.knowledge.worker"]
    deploy:
      resources:
        limits:
          cpus: "${COMPOSE_CPU_KNOWLEDGE:-0.20}"
          memory: ${COMPOSE_MEM_KNOWLEDGE:-256M}
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "${COMPOSE_CPU_PROMETHEUS:-0.20}"
          memory: ${COMPOSE_MEM_PROMETHEUS:-128M}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-voxforge}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "${COMPOSE_CPU_GRAFANA:-0.20}"
          memory: ${COMPOSE_MEM_GRAFANA:-128M}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "${COMPOSE_CPU_NGINX:-0.10}"
          memory: ${COMPOSE_MEM_NGINX:-128M}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot:v2.11.0
    profiles: ["certbot"]
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c
    command: >
      "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h; done"

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_certs:
